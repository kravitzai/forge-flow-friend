# ForgeAI Local Connector — Docker Compose Example
#
# Auth: Proxmox API token (recommended)
#   1. Create an API token in Proxmox: Datacenter → Permissions → API Tokens
#   2. Set PROXMOX_TOKEN_SECRET below or via .env file
#   3. Run: docker compose up -d
#
# Password auth (fallback):
#   Comment out TOKEN_ID/TOKEN_SECRET, uncomment USERNAME/PASSWORD.
#   Use a .env file or docker secrets — never hardcode passwords.

services:
  forgeai-connector:
    image: ghcr.io/kravitzai/forge-flow-friend/connector-agent:latest
    container_name: forgeai-connector
    restart: unless-stopped
    environment:
      # Required: Your ForgeAI connector token (from /account/local-systems)
      CONNECTOR_TOKEN: "${CONNECTOR_TOKEN}"

      # Required: Your Proxmox VE URL (accessible from this machine)
      PROXMOX_BASE_URL: "https://192.168.1.100:8006"

      # Recommended: API token auth
      PROXMOX_TOKEN_ID: "monitoring@pve!forgeai"
      PROXMOX_TOKEN_SECRET: "${PROXMOX_TOKEN_SECRET}"

      # Fallback: Username/password (use .env file, not inline values)
      # PROXMOX_USERNAME: "root@pam"
      # PROXMOX_PASSWORD: "${PROXMOX_PASSWORD}"

      # Optional settings
      # PROXMOX_NODE: "pve1"              # Limit to specific node
      # POLL_INTERVAL_SECONDS: "30"        # Collection interval (default: 30)
      INSECURE_SKIP_VERIFY: "true"         # Accept self-signed certs (common for Proxmox)
      # LOG_LEVEL: "debug"
